<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Manager</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="vh-100 w-100">
    <!-- input task and set priority  -->
    <section class="container mb-5">
      <div class="py-3 mb-5">
        <h2 class="text-center">Your Daily Task Manager</h2>
      </div>
      <div class="d-flex justify-content-center gap-3 shadow p-3 rounded">
        <input
          id="input-task-text"
          type="text"
          class="w-50"
          placeholder="Enter your task.."
          
        />
        <select
          id="input-task-priority"
          class="form-select w-25"
          aria-label="Select Priority"
        >
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <button>test</button>
        <button id="input-add-button" class="btn btn-primary w-25">
          Add Task
        </button>
      </div>
    </section>

    <!-- filteration and searching  -->
    <section class="container">
      <div class="d-flex justify-content-center gap-3 shadow p-3 rounded">
        <input
          id="input-filter-text"
          type="text"
          class="w-25"
          placeholder="Search your task..."
        />

        <select
          id="input-filter-priority"
          class="form-select w-25"
          aria-label="Select Priority"
        >
          <option value="all">All</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select
          id="input-filter-status"
          class="form-select w-25"
          aria-label="Select Status"
        >
          <option value="all">All</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
        </select>
        <button id="input-filter-button" class="btn btn-primary w-25">
          Filter
        </button>
      </div>
    </section>

    <!-- task view edit and delete and status change  -->
    <section class="container h-50 mt-5">
      <div
        id="task-display-box"
        class="d-flex w-100 flex-column align-items-center"
      ></div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
  
</html>
