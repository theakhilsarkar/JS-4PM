<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>

<body style="height: 100vh; width: 100%;">
    <div class="container">
        <div class="my-4">
            <h2>Your Favourite Quotes</h2>
        </div>
        <div id="fav-quotes-div">

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const favDiv = document.getElementById("fav-quotes-div");

        function deleteQuote(i) {
            console.log("delete function called ....");

            const quotes = JSON.parse(localStorage.getItem("favList"))
            quotes.splice(i, 1);
            localStorage.setItem("favList", JSON.stringify(quotes));
            displayFavQuotes();
        }

        function displayFavQuotes() {
            const quotes = JSON.parse(localStorage.getItem("favList"))
            favDiv.innerHTML = "";
            console.log(quotes)
            quotes.map((quote, i) => {
                const div = document.createElement("div"); // used to create element
                // div = <div></div>
                div.innerHTML = `<div class="shadow p-2 rounded">
                <p class="fs-4">${quote.quote}</p>
                <p>${quote.author}</p>
                <button onclick="deleteQuote(${i})" class='btn btn-danger'>Delete</button>
            </div>`;
                favDiv.appendChild(div);
            })
        }

        displayFavQuotes();
    </script>
</body>

</html>
